name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . pytest pyinstaller
      - run: pytest tests/
      - name: Set version from tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          python -c "
          import os, re
          tag = os.environ['TAG_NAME'].lstrip('v')
          path = 'src/checkpoint/__init__.py'
          content = open(path).read()
          content = re.sub(r'__version__\s*=\s*[\"\']\S*[\"\']', f'__version__ = \"{tag}\"', content)
          open(path, 'w').write(content)
          print('Version set to', tag)
          "
      - run: pyinstaller checkpoint.spec
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/checkpoint.exe
