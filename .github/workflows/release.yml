name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e . pytest pyinstaller
      - run: pytest tests/
      - run: pyinstaller --onefile --windowed --name checkpoint src/checkpoint/__main__.py
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/checkpoint.exe
